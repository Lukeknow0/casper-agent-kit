name: Bug report
description: Report a reproducible problem in CasperAgentKit
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include private keys, wallet files, API tokens, or sensitive data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe sequence that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or version
      placeholder: 983a730 or v0.1.0
    validations:
      required: true
