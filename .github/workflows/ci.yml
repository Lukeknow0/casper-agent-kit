name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: TypeScript check
        run: npm run check

      - name: Build contract
        run: npm run contract:build

      - name: Verify live Casper proof
        run: npm run verify:proof

      - name: MCP smoke test
        run: npm run mcp:smoke
